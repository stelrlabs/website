<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Join an Orion accountability group." />
    <title>Join an Orion group</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
      :root {
        --accent-blue: #007AFF;
        --text-primary: #f5f5f7;
        --text-secondary: #86868b;
        --bg-dark: #000000;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
        background: var(--bg-dark);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2em 1.5em;
      }
      .card { max-width: 420px; width: 100%; text-align: center; }
      h1 { font-size: 1.9rem; font-weight: 600; margin-bottom: 0.6em; }
      p { color: var(--text-secondary); line-height: 1.55; margin-bottom: 1.2em; font-size: 1.05rem; }
      .code-pill {
        display: inline-block;
        padding: 0.55em 1.1em;
        background: #1c1c1e;
        color: var(--text-primary);
        border-radius: 10px;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 1.05rem;
        letter-spacing: 0.05em;
        margin: 0.4em 0 1.5em;
      }
      .btn {
        display: inline-block;
        padding: 0.85em 1.8em;
        background: var(--accent-blue);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 500;
        font-size: 1rem;
      }
      .btn:hover { opacity: 0.9; }
      .hint { margin-top: 1.5em; font-size: 0.9rem; color: var(--text-secondary); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Join an Orion group</h1>
      <p>You're being invited to an accountability group on Orion.</p>
      <div id="code-display" hidden>
        Invite code:
        <div class="code-pill" id="code-pill"></div>
      </div>
      <a class="btn" href="https://apps.apple.com/app/orion">Get Orion</a>
      <p class="hint">After installing, tap the invite link again to join the group.</p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").replace(/[^A-Za-z0-9_-]/g, "");
      if (code) {
        document.getElementById("code-pill").textContent = code;
        document.getElementById("code-display").hidden = false;
      }
    </script>
  </body>
</html>
